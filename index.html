<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xayrullo Ota Savdo Markazi</title>
    
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --navy-blue: #0B192C;
            --white: #FFFFFF;
            --light-gray: #F4F6F9;
            --orange: #FF6B00;
            --text-color: #333333;
            --gray-text: #777777;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--light-gray);
            margin: 0;
            padding: 0;
            color: var(--text-color);
        }

        /* Dizayndagi Header qismi */
        .header {
            background-color: var(--white);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--navy-blue);
            margin: 0;
        }

        /* Qidiruv tizimi paneli */
        .search-container {
            padding: 10px 15px;
            background-color: var(--white);
        }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #dddddd;
            border-radius: 8px;
            font-size: 14px;
            background-color: #FAFAFA;
            outline: none;
            box-sizing: border-box;
        }

        /* Kategoriya tugmalari */
        .categories-container {
            display: flex;
            gap: 10px;
            padding: 10px 15px;
            overflow-x: auto;
            background-color: var(--white);
            border-bottom: 1px solid #eee;
        }

        .category-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid #eeeeee;
            background-color: #f5f5f5;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            color: var(--navy-blue);
            transition: all 0.2s ease;
        }

        .category-btn.active {
            background-color: var(--navy-blue);
            color: var(--white);
            border-color: var(--navy-blue);
        }

        /* Tovar ro'yxati tarmog'i */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 15px;
            padding-bottom: 100px;
        }

        .product-card {
            background-color: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .product-img-wrapper {
            position: relative;
            width: 100%;
            padding-top: 100px; /* Rasmlar uchun joy */
            background-color: #eaeaea;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-img-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
            font-size: 12px;
            text-align: center;
        }

        .discount-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background-color: var(--orange);
            color: var(--white);
            font-size: 11px;
            font-weight: 700;
            padding: 3px 6px;
            border-radius: 4px;
            z-index: 10;
        }

        .product-info {
            padding: 10px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-title {
            font-size: 14px;
            font-weight: 600;
            margin: 0 0 4px 0;
            color: var(--text-color);
        }

        .product-stock {
            font-size: 11px;
            color: var(--gray-text);
            margin-bottom: 8px;
        }

        .price-container {
            margin-top: auto;
            margin-bottom: 10px;
        }

        .old-price {
            font-size: 11px;
            color: #999;
            text-decoration: line-through;
            margin-bottom: 2px;
        }

        .current-price {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-color);
        }

        .add-to-cart-btn {
            background-color: var(--orange);
            color: var(--white);
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            width: 100%;
        }

        /* Savat va Buyurtma berish paneli */
        .cart-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--white);
            padding: 15px;
            box-shadow: 0 -3px 10px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 200;
        }

        .cart-info {
            display: flex;
            flex-direction: column;
        }

        .cart-count {
            font-size: 12px;
            color: var(--gray-text);
        }

        .cart-total {
            font-size: 18px;
            font-weight: 700;
            color: var(--navy-blue);
        }

        .order-btn {
            background-color: var(--orange);
            color: var(--white);
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="header-title">Xayrullo ota savdo markazi</h1>
    </div>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Mahsulotlarni qidirish..." oninput="filterProducts()">
        </div>
    </div>

    <div class="categories-container">
        <button class="category-btn active" onclick="selectCategory('all', this)">Barchasi</button>
        <button class="category-btn" onclick="selectCategory('Maishiy texnika', this)">Maishiy texnika</button>
        <button class="category-btn" onclick="selectCategory('Qurilish mollari', this)">Qurilish mollari</button>
    </div>

    <div class="products-grid" id="products-container">
        </div>

    <div class="cart-footer">
        <div class="cart-info">
            <span class="cart-count" id="cart-count">Savat: 0 mahsulot</span>
            <span class="cart-total" id="cart-total">0 so'm</span>
        </div>
        <button class="order-btn" onclick="sendOrder()">Buyurtma berish ➔</button>
    </div>

    <script>
        // SIZNING DEV TUNNELS HAVOLANGIZ
        const API_URL = "https://829t3538-8000.inc1.devtunnels.ms/get-products";
        
        let allProducts = [];
        let filteredProducts = [];
        let currentCategory = 'all';
        let cart = {};

        // API dan tovarlarni tortib olish
        async function fetchProducts() {
            try {
                const response = await fetch(API_URL, {
                    headers: {
                        "X-Tunnel-Skip-Anti-Phishing-Page": "true",
                        "User-Agent": "Mozilla/5.0"
                    }
                });
                allProducts = await response.json();
                applyFilters();
            } catch (error) {
                document.getElementById('products-container').innerHTML = 
                    `<div style="grid-column: span 2; text-align:center; color:red; padding:20px; font-size: 14px;">
                        ❌ Ma'lumotlar yuklanmadi. Port ochiqligini tekshiring!
                     </div>`;
            }
        }

        // Kategoriya tugmasi bosilganda
        function selectCategory(category, element) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            currentCategory = category;
            applyFilters();
        }

        // Qidiruv va Kategoriyani bir vaqtda qo'llash
        function filterProducts() {
            applyFilters();
        }

        function applyFilters() {
            const searchQuery = document.getElementById('search-input').value.toLowerCase();
            
            filteredProducts = allProducts.filter(product => {
                // Bu yerda kategoriya tekshiruvi (baza strukturangizga qarab moslashadi)
                // Agar bazada kategoriya yo'q bo'lsa, nomiga qarab taxmin qiladi
                const matchesCategory = currentCategory === 'all' || 
                    (product.category && product.category === currentCategory) ||
                    (currentCategory === 'Maishiy texnika' && (product.title.toLowerCase().includes('televizor') || product.title.toLowerCase().includes('konditsioner') || product.title.toLowerCase().includes('choynak')));
                
                const matchesSearch = product.title.toLowerCase().includes(searchQuery);
                
                return matchesCategory && matchesSearch;
            });

            renderProducts(filteredProducts);
        }

        // Tovarlarni ekranga chiqarish (Dizaynga 100% mos)
        function renderProducts(products) {
            const container = document.getElementById('products-container');
            container.innerHTML = '';

            if (products.length === 0) {
                container.innerHTML = `<div style="grid-column: span 2; text-align:center; color:#888; padding:20px;">Mahsulot topilmadi</div>`;
                return;
            }

            products.forEach(product => {
                // Chegirma hisoblash
                let discountBadge = '';
                if (product.old_price && product.old_price > product.price) {
                    const pct = Math.round(((product.old_price - product.price) / product.old_price) * 100);
                    discountBadge = `<div class="discount-badge">-${pct}%</div>`;
                }

                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    ${discountBadge}
                    <div class="product-img-wrapper">
                        <div class="product-img-placeholder">${product.title}</div>
                    </div>
                    <div class="product-info">
                        <h3 class="product-title">${product.title}</h3>
                        <span class="product-stock">Qoldiq: ${product.stock} ${product.unit || 'dona'}</span>
                        <div class="price-container">
                            ${product.old_price ? `<div class="old-price">${product.old_price.toLocaleString()} so'm</div>` : ''}
                            <div class="current-price">${product.price.toLocaleString()} so'm</div>
                        </div>
                        <button class="add-to-cart-btn" onclick="addToCart(${product.id})">
                            🛒 Savatga
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Savat funksiyalari
        function addToCart(id) {
            const product = allProducts.find(p => p.id === id);
            if (!product) return;

            if (cart[id]) {
                if (cart[id].quantity < product.stock) {
                    cart[id].quantity += 1;
                } else {
                    alert("Omborda yetarli mahsulot yo'q!");
                    return;
                }
            } else {
                cart[id] = { title: product.title, price: product.price, quantity: 1 };
            }
            updateCartUI();
        }

        function updateCartUI() {
            let totalItems = 0;
            let totalPrice = 0;

            Object.values(cart).forEach(item => {
                totalItems += item.quantity;
                totalPrice += item.price * item.quantity;
            });

            document.getElementById('cart-count').innerText = `Savat: ${totalItems} mahsulot`;
            document.getElementById('cart-total').innerText = `${totalPrice.toLocaleString()} so'm`;
        }

        // Telegramga buyurtmani yuborish
        function sendOrder() {
            if (Object.keys(cart).length === 0) {
                alert("Savat bo'sh! Tovar qo'shing.");
                return;
            }

            const orderData = {
                items: cart,
                total_price: Object.values(cart).reduce((sum, item) => sum + (item.price * item.quantity), 0)
            };

            // Telegram botga ma'lumot uzatish
            Telegram.WebApp.sendData(JSON.stringify(orderData));
            Telegram.WebApp.close();
        }

        // Ishga tushirish
        window.onload = function() {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
            fetchProducts();
        };
    </script>
</body>
</html>
