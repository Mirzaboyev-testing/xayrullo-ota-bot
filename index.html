<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xayrullo Ota Savdo Markazi</title>
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --navy-blue: #0B192C;
            --white: #FFFFFF;
            --light-gray: #F4F6F9;
            --orange: #FF6B00;
            --text-color: #333333;
            --gray-text: #777777;
            --border-color: #EAEAEA;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--light-gray);
            margin: 0;
            padding: 0;
            color: var(--text-color);
        }

        .page { display: none; padding-bottom: 140px; }
        .page.active { display: block; }

        /* RO‘YXATDAN O‘TISH SAHIFASI */
        .auth-container {
            background-color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            box-sizing: border-box;
        }

        .auth-logo { font-size: 24px; font-weight: 800; color: var(--navy-blue); margin-bottom: 25px; }
        .form-group { width: 100%; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; }
        
        .lang-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .lang-btn {
            padding: 14px; border: 1px solid var(--border-color); border-radius: 12px;
            background-color: #FAFAFA; font-size: 14px; font-weight: 600; cursor: pointer;
        }
        .lang-btn.active { background-color: var(--navy-blue); color: var(--white); }

        .input-field {
            width: 100%; padding: 14px; border: 1px solid var(--border-color);
            border-radius: 12px; font-size: 14px; background-color: #FAFAFA; box-sizing: border-box;
        }

        .submit-btn {
            width: 100%; background-color: var(--navy-blue); color: var(--white);
            border: none; padding: 16px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer;
        }

        /* ASOSIY PROGRAMMA */
        .header {
            background-color: var(--white); padding: 15px; display: flex;
            align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-color);
        }
        .header-title { font-size: 18px; font-weight: 700; color: var(--navy-blue); margin: 0; }
        .lang-switch-header {
            background: none; border: 1px solid var(--navy-blue); padding: 4px 10px;
            border-radius: 6px; font-size: 12px; font-weight: 700; color: var(--navy-blue); cursor: pointer;
        }

        .search-container { padding: 10px 15px; background-color: var(--white); }
        .search-box input {
            width: 100%; padding: 12px 15px; border: 1px solid var(--border-color);
            border-radius: 8px; background-color: #FAFAFA; box-sizing: border-box; outline: none;
        }

        .categories-container { display: flex; gap: 10px; padding: 10px 15px; overflow-x: auto; background-color: var(--white); }
        .category-btn {
            padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border-color);
            background-color: #f5f5f5; font-size: 14px; font-weight: 600; white-space: nowrap; cursor: pointer;
        }
        .category-btn.active { background-color: var(--navy-blue); color: var(--white); }

        /* MAHSULOTLAR RO'YXATI */
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .product-card { background-color: var(--white); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        
        .product-img { width: 100%; height: 140px; object-fit: cover; background-color: #EAEAEA; }
        .discount-badge { position: absolute; top: 8px; right: 8px; background-color: var(--orange); color: var(--white); font-size: 11px; font-weight: 700; padding: 3px 6px; border-radius: 4px; }

        .product-info { padding: 10px; display: flex; flex-direction: column; flex-grow: 1; }
        .product-title { font-size: 14px; font-weight: 600; margin: 0 0 4px 0; }
        .product-stock { font-size: 11px; color: var(--gray-text); margin-bottom: 8px; }
        .price-container { margin-top: auto; margin-bottom: 10px; }
        .old-price { font-size: 11px; color: #999; text-decoration: line-through; }
        .current-price { font-size: 15px; font-weight: 700; }
        
        .add-to-cart-btn { background-color: var(--orange); color: var(--white); border: none; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }

        /* FLOATING FOOTER CART (FAKAT MAXSULOT BO'LSA CHIQADI) */
        .cart-footer {
            position: fixed; bottom: 65px; left: 0; right: 0; background-color: var(--white);
            padding: 12px 15px; box-shadow: 0 -3px 10px rgba(0,0,0,0.05);
            display: none; align-items: center; justify-content: space-between; z-index: 150;
        }

        .order-btn { background-color: var(--orange); color: var(--white); border: none; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }

        /* PASTKI NAVBAR */
        .bottom-navbar { position: fixed; bottom: 0; left: 0; right: 0; background-color: var(--white); height: 65px; border-top: 1px solid var(--border-color); display: grid; grid-template-columns: repeat(4, 1fr); z-index: 200; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--gray-text); cursor: pointer; gap: 4px; position: relative; }
        .nav-item.active { color: var(--orange); }
        .nav-icon { font-size: 20px; }
        .nav-badge { position: absolute; top: 6px; right: 22px; background-color: var(--orange); color: var(--white); font-size: 9px; padding: 2px 5px; border-radius: 50%; font-weight: 700; }
        .static-page-content { padding: 20px; background-color: var(--white); margin: 15px; border-radius: 12px; }
    </style>
</head>
<body>

    <!-- 1. RO'YXATDAN O'TISH -->
    <div id="auth-page" class="auth-container" style="display: none;">
        <div class="auth-logo">🛡️ XAYRULLO OTA</div>
        <div class="form-group">
            <label id="lbl-lang">Alifboni tanlang / Алифбони танланг</label>
            <div class="lang-selector">
                <button class="lang-btn active" onclick="setRegLang('uz')">Lotin alifbosi</button>
                <button class="lang-btn" onclick="setRegLang('kr')">Кирилл алифбоси</button>
            </div>
        </div>
        <div class="form-group">
            <label id="lbl-name">Ism va Familiya</label>
            <input type="text" id="reg-name" class="input-field" placeholder="Ismingizni kiriting">
        </div>
        <div class="form-group">
            <label id="lbl-phone">Telefon raqami</label>
            <input type="tel" id="reg-phone" class="input-field" value="+998 ">
        </div>
        <button class="submit-btn" onclick="submitRegistration()" id="btn-reg-text">Ro'yxatdan o'tish</button>
    </div>

    <!-- 2. ASOSIY PROGRAMMA -->
    <div id="main-app" style="display: none;">
        <div class="header">
            <h1 class="header-title" id="app-header-title">Xayrullo ota savdo markazi</h1>
            <button class="lang-switch-header" onclick="toggleGlobalLanguage()" id="btn-toggle-lang">LOTIN</button>
        </div>

        <!-- TABS -->
        <div id="page-asosiy" class="page active">
            <div class="search-container"><div class="search-box"><input type="text" id="search-input" placeholder="Mahsulotlarni qidirish..." oninput="filterProducts()"></div></div>
            <div class="categories-container">
                <button class="category-btn active" id="cat-all" onclick="selectCategory('all', this)">Barchasi</button>
                <button class="category-btn" id="cat-texnika" onclick="selectCategory('Maishiy texnika', this)">Maishiy texnika</button>
                <button class="category-btn" id="cat-mollari" onclick="selectCategory('Qurilish mollari', this)">Qurilish mollari</button>
            </div>
            <div class="products-grid" id="products-container"></div>
        </div>

        <div id="page-katalog" class="page"><div class="static-page-content"><h3 id="title-katalog">Katalog bo'limi</h3></div></div>
        <div id="page-savat" class="page"><div class="static-page-content"><h3 id="title-savat">Sizning savatingiz</h3><div id="cart-items-list">Savat bo'sh</div></div></div>
        <div id="page-profil" class="page"><div class="static-page-content"><h3 id="title-profil">Foydalanuvchi profili</h3><p>ID: <span id="prof-id">-</span></p></div></div>

        <!-- Floating Cart (Faqat tovar bo'lsa chiqadi) -->
        <div class="cart-footer" id="floating-cart">
            <div>
                <span id="cart-count">Savat: 0 mahsulot</span><br>
                <span id="cart-total" style="font-size: 18px; font-weight: 700; color: var(--navy-blue);">0 so'm</span>
            </div>
            <button class="order-btn" onclick="sendOrder()" id="btn-order">Buyurtma berish ➔</button>
        </div>

        <!-- BOTTOM NAVBAR -->
        <div class="bottom-navbar">
            <div class="nav-item active" onclick="switchTab('asosiy', this)"><span class="nav-icon">🏠</span><span id="nav-lbl-home">Asosiy</span></div>
            <div class="nav-item" onclick="switchTab('katalog', this)"><span class="nav-icon">📱</span><span id="nav-lbl-cat">Katalog</span></div>
            <div class="nav-item" onclick="switchTab('savat', this)"><span class="nav-icon">🛒</span><span id="nav-lbl-cart">Savat</span><span class="nav-badge" id="nav-cart-badge" style="display: none;">0</span></div>
            <div class="nav-item" onclick="switchTab('profil', this)"><span class="nav-icon">👤</span><span id="nav-lbl-prof">Profil</span></div>
        </div>
    </div>

    <script>
        const API_BASE = "https://829t3538-8000.inc1.devtunnels.ms";
        let allProducts = [];
        let cart = JSON.parse(localStorage.getItem('tg_shop_cart')) || {}; // Savatni eslab qolish (QA talabi)
        let currentLang = 'uz';
        let telegramUser = null;

        const dictionary = {
            uz: {
                lblName: "Ism va Familiya", lblPhone: "Telefon raqami", btnReg: "Ro'yxatdan o'tish",
                searchPlaceholder: "Mahsulotlarni qidirish...", catAll: "Barchasi", orderBtn: "Buyurtma berish ➔",
                homeTab: "Asosiy", catTab: "Katalog", cartTab: "Savat", profTab: "Profil", cartLabel: "Savat:", emptyCart: "Savat bo'sh"
            },
            kr: {
                lblName: "Исм ва Фамилия", lblPhone: "Телефон рақами", btnReg: "Рўйхатдан ўтиш",
                searchPlaceholder: "Маҳсулотларни қидириш...", catAll: "Барчаси", orderBtn: "Буюртма бериш ➔",
                homeTab: "Асосий", catTab: "Каталог", cartTab: "Сават", profTab: "Профил", cartLabel: "Сават:", emptyCart: "Сават бўш"
            }
        };

        async function checkUserAuthentication() {
            if (window.Telegram && window.Telegram.WebApp) {
                Telegram.WebApp.ready();
                Telegram.WebApp.expand();
                telegramUser = Telegram.WebApp.initDataUnsafe.user || { id: 99999 };
                
                // Optimizatsiya: Avval UI yuklanadi, API keyin fon rejimida chaqiriladi (Sekinlashuvni oldini olish uchun)
                if (!localStorage.getItem(`reg_${telegramUser.id}`)) {
                    showAuthPage();
                } else {
                    showMainApp();
                }
            }
        }

        function showAuthPage() { document.getElementById('auth-page').style.display = 'flex'; }
        function showMainApp() {
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            fetchProducts();
            updateCartUI();
        }

        function setRegLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            applyLanguageUI();
        }

        function toggleGlobalLanguage() {
            currentLang = currentLang === 'uz' ? 'kr' : 'uz';
            document.getElementById('btn-toggle-lang').innerText = currentLang === 'uz' ? 'LOTIN' : 'КИРИЛЛ';
            applyLanguageUI();
        }

        function applyLanguageUI() {
            const d = dictionary[currentLang];
            document.getElementById('lbl-name').innerText = d.lblName;
            document.getElementById('lbl-phone').innerText = d.lblPhone;
            document.getElementById('btn-reg-text').innerText = d.btnReg;
            document.getElementById('search-input').placeholder = d.searchPlaceholder;
            document.getElementById('cat-all').innerText = d.catAll;
            document.getElementById('btn-order').innerText = d.orderBtn;
            document.getElementById('nav-lbl-home').innerText = d.homeTab;
            document.getElementById('nav-lbl-cat').innerText = d.catTab;
            document.getElementById('nav-lbl-cart').innerText = d.cartTab;
            document.getElementById('nav-lbl-prof').innerText = d.profTab;
            updateCartUI();
        }

        function submitRegistration() {
            const name = document.getElementById('reg-name').value.trim();
            if (!name) return alert("Ismni kiriting!");
            localStorage.setItem(`reg_${telegramUser.id}`, JSON.stringify({ name }));
            showMainApp();
        }

        function switchTab(tabId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`page-${tabId}`).classList.add('active');
            element.classList.add('active');
            if (tabId === 'savat') renderCartPage();
        }

        async function fetchProducts() {
            try {
                const response = await fetch(`${API_BASE}/get-products`, { headers: { "X-Tunnel-Skip-Anti-Phishing-Page": "true" } });
                allProducts = await response.json();
                renderProducts(allProducts);
            } catch (error) {
                document.getElementById('products-container').innerHTML = `<div style="grid-column:span 2;text-align:center;color:red;padding:20px;">Port xatosi! Serverni yoqing.</div>`;
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            products.forEach(p => {
                // Rasm manzili tekshiruvi (Agar bazada rasm linki bo'lsa o'shani qo'yadi, bo'lmasa tayyor rasm)
                const imgUrl = p.image_url ? p.image_url : "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400";
                
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${imgUrl}" class="product-img" onerror="this.src='https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400'">
                    <div class="product-info">
                        <h3 class="product-title">${p.title}</h3>
                        <span class="product-stock">Qoldiq: ${p.stock}</span>
                        <div class="price-container"><div class="current-price">${p.price.toLocaleString()} so'm</div></div>
                        <button class="add-to-cart-btn" onclick="addToCart(${p.id})">🛒 Savatga</button>
                    </div>`;
                container.appendChild(card);
            });
        }

        function addToCart(id) {
            const product = allProducts.find(p => p.id === id);
            if (!product) return;
            if (cart[id]) cart[id].quantity++;
            else cart[id] = { title: product.title, price: product.price, quantity: 1 };
            
            localStorage.setItem('tg_shop_cart', JSON.stringify(cart)); // Keshga yozish
            updateCartUI();
        }

        function updateCartUI() {
            let totalItems = 0; let totalPrice = 0;
            Object.values(cart).forEach(i => { totalItems += i.quantity; totalPrice += i.price * i.quantity; });

            const d = dictionary[currentLang];
            document.getElementById('cart-count').innerText = `${d.cartLabel} ${totalItems}`;
            document.getElementById('cart-total').innerText = `${totalPrice.toLocaleString()} so'm`;

            // QA Talabi: Faqat mahsulot tanlanganda buyurtma paneli chiqadi
            const floatingCart = document.getElementById('floating-cart');
            if (totalItems > 0) {
                floatingCart.style.display = 'flex';
                document.getElementById('nav-cart-badge').style.display = 'block';
                document.getElementById('nav-cart-badge').innerText = totalItems;
            } else {
                floatingCart.style.display = 'none';
                document.getElementById('nav-cart-badge').style.display = 'none';
            }
        }

        function renderCartPage() {
            const container = document.getElementById('cart-items-list');
            if (Object.keys(cart).length === 0) { container.innerHTML = dictionary[currentLang].emptyCart; return; }
            let html = '';
            Object.values(cart).forEach(i => { html += `<p>${i.title} x ${i.quantity} - ${(i.price * i.quantity).toLocaleString()} so'm</p>`; });
            container.innerHTML = html;
        }

        function filterProducts() {
            const q = document.getElementById('search-input').value.toLowerCase();
            renderProducts(allProducts.filter(p => p.title.toLowerCase().includes(q)));
        }

        window.onload = checkUserAuthentication;
    </script>
</body>
</html>
